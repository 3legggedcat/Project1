<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pipe-and-Filter Notes</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <h1>Pipe-and-Filter Notes</h1>
  <p>This version processes note requests through ordered filters.</p>

  <h2>Add Note</h2>
  <form id="note-form">
    <label for="name">Name</label>
    <input id="name" name="name" type="text" placeholder="Anonymous">

    <label for="content">Note</label>
    <textarea id="content" name="content" placeholder="Write a note" required></textarea>

    <label for="password">Deletion password</label>
    <input id="password" name="password" type="password" placeholder="Optional password">

    <button type="submit">Save Note</button>
  </form>

  <h2>Pipeline Stages</h2>
  <pre id="pipeline-view"></pre>

  <h2>Saved Notes</h2>
  <ul id="notes-list"></ul>

  <script src="/app.js"></script>
</body>
</html>
